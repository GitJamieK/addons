name: Update CurseForge metadata

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: curseforge-metadata
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh CurseForge metadata
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_DISPLAY_TIME_ZONE: Europe/Stockholm
        run: node scripts/update-curseforge-meta.mjs

      - name: Commit metadata changes
        run: |
          if git diff --quiet -- assets/data/addon-meta.json; then
            echo "No CurseForge metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/addon-meta.json
          git commit -m "Update CurseForge addon metadata"
          git push
